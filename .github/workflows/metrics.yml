name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Cabeçalho e Atividade Geral
      - name: General Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: joaolive
          filename: assets/metrics.svg
          base: header, activity, community, repositories, metadata
          plugin_lines: yes

      # Step 2: Apenas as Linguagens (Arquivo Separado)
      - name: Language Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: joaolive
          filename: assets/languages.svg # Novo arquivo
          base: "" # Remove o cabeçalho/stats gerais
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

      # Step 3: Apenas AniList (Arquivo Separado)
      - name: AniList Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: joaolive
          filename: assets/anilist.svg
          base: "" # Remove o cabeçalho/stats gerais
          plugin_anilist: yes
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites
          plugin_anilist_limit: 4
